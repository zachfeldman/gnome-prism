<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 64 64" fill="none" preserveAspectRatio="xMidYMid meet">
  <!-- Safe body -->
  <rect x="8" y="14" width="48" height="44" rx="0" stroke="var(--fill-0, #BDA7F0)" stroke-width="4" fill="none"/>
  <!-- Safe door inner border -->
  <rect x="16" y="22" width="32" height="28" rx="0" stroke="var(--fill-0, #BDA7F0)" stroke-width="2" fill="none"/>
  <!-- Handle / dial -->
  <circle cx="32" cy="36" r="7" stroke="var(--fill-0, #BDA7F0)" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="36" r="2" fill="var(--fill-0, #BDA7F0)"/>
  <!-- Handle bar -->
  <line x1="39" y1="36" x2="46" y2="36" stroke="var(--fill-0, #BDA7F0)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hinges -->
  <rect x="8" y="22" width="4" height="6" fill="var(--fill-0, #BDA7F0)"/>
  <rect x="8" y="42" width="4" height="6" fill="var(--fill-0, #BDA7F0)"/>
  <!-- Top lip / safe top -->
  <rect x="6" y="12" width="52" height="4" fill="var(--fill-0, #BDA7F0)"/>
  <!-- Arrow going into safe (backup concept) -->
  <path d="M32 2 L32 12" stroke="var(--fill-0, #BDA7F0)" stroke-width="3" stroke-linecap="round"/>
  <path d="M26 7 L32 2 L38 7" stroke="var(--fill-0, #BDA7F0)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
