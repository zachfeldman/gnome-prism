<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 128 128" fill="none" preserveAspectRatio="xMidYMid meet">
  <g stroke="var(--fill-0, #BDA7F0)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- USB stick body -->
    <rect x="36" y="18" width="56" height="80" rx="6"/>
    <!-- USB connector -->
    <rect x="44" y="98" width="40" height="18" rx="2"/>
    <!-- USB connector pins -->
    <line x1="54" y1="98" x2="54" y2="116"/>
    <line x1="74" y1="98" x2="74" y2="116"/>
    <!-- LED indicator -->
    <circle cx="64" cy="34" r="6" fill="var(--fill-0, #BDA7F0)"/>
  </g>
</svg>
