    <line x1="28" y1="62" x2="60" y2="62"/>
    <line x1="28" y1="74" x2="92" y2="74"/>
    <line x1="28" y1="86" x2="68" y2="86"/>
    <line x1="28" y1="98" x2="50" y2="98"/>
  </g>
</svg>
